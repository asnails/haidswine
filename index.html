<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牧知汇 - 猪群健康管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f8fc;
            color: #1a2c3e;
            line-height: 1.4;
        }

        /* 顶部导航栏 - 深蓝色底 + 白色文字 */
        .navbar {
            background: #1e4a76;
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .nav-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
        }

        .logo p {
            font-size: 0.65rem;
            color: #bcd0e4;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #ffffff;
            font-size: 0.85rem;
            padding: 4px 0;
            opacity: 0.85;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
            border-bottom: 2px solid #ffffff;
        }

        /* 双栏布局：左侧2x2网格，右侧边栏 */
        .two-columns {
            display: flex;
            gap: 32px;
            margin: 28px 0;
        }

        .main-content {
            flex: 3;
        }

        .sidebar {
            flex: 1;
        }

        /* 2x2 模块网格 */
        .modules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* 模块卡片 - 白底 */
        .module-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            border: 1px solid #e8edf2;
        }

        .module-header {
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
        }

        .module-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1e4a76;
        }

        /* 文章列表 - 单列显示 */
        .module-articles {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .article-item {
            padding: 8px 0;
            border-bottom: 1px dashed #eff3f8;
        }

        .article-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c3e50;
            text-decoration: none;
            display: block;
            transition: 0.2s;
            line-height: 1.4;
        }

        .article-link:hover {
            color: #3b82f6;
        }

        /* 侧边栏卡片 */
        .sidebar-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid #e8edf2;
        }

        .sidebar-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e4a76;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 14px;
        }

        .timeline-item, .hot-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4f9;
            font-size: 0.8rem;
        }

        .timeline-date {
            color: #8ba3bc;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .timeline-title, .hot-title {
            color: #2c3e50;
            text-decoration: none;
        }

        .timeline-title:hover, .hot-title:hover {
            color: #3b82f6;
        }

        .hot-item .rank {
            color: #3b82f6;
            font-weight: 600;
            font-size: 0.75rem;
            min-width: 22px;
        }

        footer {
            background: #e9f0f7;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            text-align: center;
            color: #4a7a9e;
            font-size: 0.75rem;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .two-columns {
                flex-direction: column;
            }
            .modules-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .container {
                padding: 0 16px;
            }
            .nav-links {
                gap: 16px;
            }
        }
    </style>
</head>
<body>

<!-- 深蓝色导航栏 -->
<div class="navbar">
    <div class="container nav-flex">
        <div class="logo">
            <h1>牧知汇</h1>
            <p>猪群健康管理 · 精准繁育智库</p>
        </div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">生产管理</a>
            <a href="#">猪群健康</a>
            <a href="#">批次化生产</a>
            <a href="#">管理思路</a>
        </div>
    </div>
</div>

<div class="container two-columns">
    <!-- 左侧主内容区：2x2 模块网格 -->
    <div class="main-content">
        <div class="modules-grid">
            <!-- 模块1：生产管理 -->
            <div class="module-card">
                <div class="module-header">
                    <div class="module-title">📋 生产管理</div>
                </div>
                <div class="module-articles" id="production-list"></div>
            </div>

            <!-- 模块2：猪群健康 -->
            <div class="module-card">
                <div class="module-header">
                    <div class="module-title">🩺 猪群健康</div>
                </div>
                <div class="module-articles" id="health-list"></div>
            </div>

            <!-- 模块3：批次化生产 -->
            <div class="module-card">
                <div class="module-header">
                    <div class="module-title">📅 批次化生产</div>
                </div>
                <div class="module-articles" id="batch-list"></div>
            </div>

            <!-- 模块4：管理思路 -->
            <div class="module-card">
                <div class="module-header">
                    <div class="module-title">💡 管理思路</div>
                </div>
                <div class="module-articles" id="management-list"></div>
            </div>
        </div>
    </div>

    <!-- 右侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-card">
            <div class="sidebar-title">🔥 热点文章</div>
            <div id="hot-list"></div>
        </div>
        <div class="sidebar-card">
            <div class="sidebar-title">📅 时间轴</div>
            <div id="timeline-list"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 牧知汇 · 猪群健康管理 | 提高繁殖效率，成为国内顶尖5%猪场</p>
</footer>

<script>
    // ==================== 文章数据 ====================
    const articlesData = {
        production: [
            "6000头规模母猪场生产节律设计",
            "全进全出模式下的产房周转率提升方案",
            "母猪非生产天数(NPD)控制与考核体系",
            "配怀舍精细化饲喂管理流程",
            "哺乳母猪采食量提升关键技术",
            "断奶仔猪过渡期护理SOP",
            "猪场周工作流程标准化模板",
            "后备母猪驯化与入群管理",
            "公猪站运营与精液质量控制",
            "生产数据采集与分析体系搭建"
        ],
        health: [
            "蓝耳病双阴性场维持策略",
            "非洲猪瘟生物安全分级管理",
            "猪流行性腹泻(PED)免疫程序优化",
            "支原体肺炎净化方案与评估",
            "猪群健康监测哨兵猪制度",
            "精准用药与抗生素减量技术",
            "口腔液检测在疾病早期预警中的应用",
            "免疫抑制病的鉴别诊断",
            "环境丰容与猪只行为健康",
            "猪场健康评估评分卡设计"
        ],
        batch: [
            "18天批次生产模式详解与优势分析",
            "烯丙孕素在批次化生产中的精准应用",
            "定时输精技术操作要点",
            "不同批次模式对比：1周批/3周批/4周批",
            "批次化生产下产房利用率计算",
            "返情母猪与批次衔接处理方案",
            "激素方案的季节调整策略",
            "批次化生产对人工效率的影响",
            "从连续流转向批次化的改造要点",
            "批次化生产中的断奶日龄优化"
        ],
        management: [
            "秦英林：养猪虽传统，但值得深耕",
            "猪周期低谷期的降本核心逻辑",
            "人效驱动：1人管理300头母猪的激励设计",
            "PSY从24到30的路径拆解",
            "数据化决策在猪场管理中的应用",
            "极限成本控制：240元断奶成本模型",
            "规模化猪场的组织架构优化",
            "从生产指标到经营利润的转化",
            "新建猪场满负荷生产爬坡计划",
            "猪场环保与粪污资源化利用思路"
        ]
    };

    const hotArticles = [
        "18天批次生产模式详解与优势分析",
        "蓝耳病双阴性场维持策略",
        "秦英林：养猪虽传统，但值得深耕",
        "PSY从24到30的路径拆解",
        "母猪非生产天数(NPD)控制与考核体系"
    ];

    const timelineData = [
        { date: "05/27", title: "批次化生产模块新增10篇文章" },
        { date: "05/26", title: "猪群健康模块内容更新" },
        { date: "05/25", title: "生产管理模块优化排版" },
        { date: "05/24", title: "管理思路模块新增行业观点" },
        { date: "05/23", title: "网站整体改版为2x2网格+单列文章" },
        { date: "05/22", title: "修复移动端显示问题" },
        { date: "05/21", title: "新增热点文章侧边栏" }
    ];

    // 渲染模块：单列显示
    function renderModule(moduleId, articles) {
        const container = document.getElementById(`${moduleId}-list`);
        if (!container) return;
        let html = '';
        articles.forEach(title => {
            html += `
                <div class="article-item">
                    <a href="#" class="article-link" data-title="${title.replace(/"/g, '&quot;')}">${title}</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderHotArticles() {
        const container = document.getElementById('hot-list');
        if (!container) return;
        let html = '';
        hotArticles.forEach((title, index) => {
            html += `
                <div class="hot-item">
                    <span class="rank">${index + 1}</span>
                    <a href="#" class="hot-title" data-title="${title.replace(/"/g, '&quot;')}">${title}</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderTimeline() {
        const container = document.getElementById('timeline-list');
        if (!container) return;
        let html = '';
        timelineData.forEach(item => {
            html += `
                <div class="timeline-item">
                    <span class="timeline-date">${item.date}</span>
                    <a href="#" class="timeline-title" data-title="${item.title.replace(/"/g, '&quot;')}">${item.title}</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function initModules() {
        renderModule('production', articlesData.production);
        renderModule('health', articlesData.health);
        renderModule('batch', articlesData.batch);
        renderModule('management', articlesData.management);
        renderHotArticles();
        renderTimeline();
    }

    function bindArticleClick() {
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('article-link') || 
                e.target.classList.contains('hot-title') || 
                e.target.classList.contains('timeline-title')) {
                e.preventDefault();
                const title = e.target.getAttribute('data-title') || e.target.textContent;
                alert(`📄 文章详情页\n\n“${title}”\n\n详情页功能即将上线，敬请期待！`);
            }
        });
    }

    initModules();
    bindArticleClick();
</script>
</body>
</html>
