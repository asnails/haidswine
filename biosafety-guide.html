<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="牧知汇·标准化养猪技术知识库 - 涵盖批次生产、疾病防控、繁殖育种、智能养猪等专业技术资源">
    <meta name="keywords" content="养猪技术,批次生产,疾病防控,智能养猪,猪场建设,育种,知识库">
    <title>牧知汇 · 标准化养猪技术知识库</title>
    <!-- TailwindCSS + Font Awesome + PDF.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f8fafc 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        /* 左侧导航样式 */
        .sidebar {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            position: sticky;
            top: 80px;
        }
        
        .nav-item-side {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0.5rem;
            border-radius: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            color: #374151;
        }
        
        .nav-item-side:hover {
            background: rgba(16, 185, 129, 0.08);
            color: #047857;
        }
        
        .nav-item-side.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .nav-icon {
            width: 2rem;
            text-align: center;
            font-size: 1.1rem;
        }
        
        /* 右侧内容卡片 */
        .content-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 25px -8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        
        .content-header {
            background: linear-gradient(105deg, #064e3b 0%, #0b5e42 100%);
            padding: 1.25rem 1.5rem;
        }
        
        /* 紧凑文件列表 */
        .file-table-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #f0f2f4;
            transition: background 0.2s;
        }
        
        .file-table-row:hover {
            background: #f9fafb;
        }
        
        .file-table-row:last-child {
            border-bottom: none;
        }
        
        .file-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 0;
        }
        
        .file-icon {
            width: 2rem;
            height: 2rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .file-name {
            font-weight: 500;
            color: #1f2937;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            font-size: 0.9rem;
        }
        
        .file-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }
        
        .file-size, .file-date {
            font-size: 0.7rem;
            color: #9ca3af;
        }
        
        .btn-preview-sm {
            background: rgba(16, 185, 129, 0.1);
            color: #0b5e42;
            padding: 0.25rem 0.875rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .btn-preview-sm:hover {
            background: #10b981;
            color: white;
        }
        
        .btn-download-sm {
            color: #6b7280;
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .btn-download-sm:hover {
            color: #10b981;
        }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }
        
        /* 预览弹窗 */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .preview-toolbar {
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .preview-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .preview-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            background: white;
            border-radius: 12px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .logo-link:hover {
            transform: scale(1.03);
        }
        
        /* 统计徽章 */
        .stat-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 0.25rem 1rem;
            font-size: 0.75rem;
        }
        
        /* 移动端适配 */
        @media (max-width: 1024px) {
            .sidebar { margin-bottom: 1.5rem; position: relative; top: 0; }
            .nav-item-side { padding: 0.6rem 0.8rem; }
        }
        
        @media (max-width: 640px) {
            .file-table-row { flex-wrap: wrap; gap: 0.5rem; }
            .file-meta { margin-left: 2.75rem; }
            .file-date, .file-size { display: none; }
        }
        
        /* 欢迎区域 */
        .welcome-section {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 6px solid #f59e0b;
        }
    </style>
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-emerald-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between py-3">
            <div class="flex items-center space-x-3">
                <a href="https://www.haidswine.com.cn" target="_blank" rel="noopener noreferrer" 
                   class="logo-link bg-gradient-to-r from-emerald-600 to-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-md">
                    <i class="fas fa-piggy-bank text-xl"></i>
                </a>
                <div>
                    <span class="text-lg md:text-xl font-extrabold bg-gradient-to-r from-emerald-800 to-green-700 bg-clip-text text-transparent">牧知汇 · 标准化养猪技术知识库</span>
                    <p class="text-xs text-emerald-600 hidden md:block">Muzhihui · Standardized Swine Technology Knowledge Base</p>
                </div>
            </div>
            <button id="mobileMenuToggle" class="lg:hidden text-gray-600 text-2xl focus:outline-none hover:text-emerald-600 transition">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>
</nav>

<!-- 主内容区：左侧导航 + 右侧内容 -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex flex-col lg:flex-row gap-6">
        <!-- 左侧导航栏 -->
        <div class="lg:w-72 flex-shrink-0" id="sidebarContainer">
            <div class="sidebar">
                <!-- Logo区域 -->
                <div class="p-4 border-b border-gray-100">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-layer-group text-emerald-600 text-lg"></i>
                        <span class="font-semibold text-gray-700">技术分类</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Technology Categories</p>
                </div>
                <!-- 导航菜单 -->
                <div class="p-2" id="navMenuSide"></div>
            </div>
        </div>
        
        <!-- 右侧内容区域 -->
        <div class="flex-1">
            <!-- 内容卡片 -->
            <div id="contentArea"></div>
        </div>
    </div>
</div>

<!-- 移动端侧滑菜单 -->
<div id="mobileSidebar" class="fixed inset-0 z-50 hidden" style="background: rgba(0,0,0,0.5);">
    <div class="w-80 h-full bg-white shadow-2xl overflow-y-auto">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-layer-group text-emerald-600"></i>
                <span class="font-semibold">技术分类</span>
            </div>
            <button id="closeMobileMenu" class="text-gray-500 text-2xl">&times;</button>
        </div>
        <div class="p-2" id="mobileNavMenuSide"></div>
    </div>
</div>

<!-- PDF 预览弹窗 -->
<div id="previewModal" class="preview-modal" style="display: none;">
    <div class="preview-toolbar">
        <div class="flex items-center space-x-4">
            <button onclick="closePreview()" class="text-white hover:text-emerald-400 transition text-xl">
                <i class="fas fa-times"></i>
            </button>
            <span id="previewTitle" class="font-medium truncate max-w-xs md:max-w-md text-sm"></span>
        </div>
        <div class="flex items-center space-x-2 md:space-x-3">
            <button id="prevPageBtn" class="bg-gray-700 hover:bg-gray-600 px-2 md:px-3 py-1 rounded-md disabled:opacity-40 text-sm" disabled>
                <i class="fas fa-chevron-left"></i> <span class="hidden md:inline">上一页</span>
            </button>
            <span id="pageInfo" class="text-xs md:text-sm">加载中...</span>
            <button id="nextPageBtn" class="bg-gray-700 hover:bg-gray-600 px-2 md:px-3 py-1 rounded-md disabled:opacity-40 text-sm" disabled>
                <span class="hidden md:inline">下一页</span> <i class="fas fa-chevron-right"></i>
            </button>
            <a id="downloadBtn" href="#" download class="bg-emerald-600 hover:bg-emerald-500 px-2 md:px-3 py-1 rounded-md text-sm transition shadow-md">
                <i class="fas fa-download"></i> <span class="hidden sm:inline">下载</span>
            </a>
        </div>
    </div>
    <div id="previewContainer" class="preview-container">
        <canvas id="previewCanvas" class="preview-canvas"></canvas>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    // 技术分类（左侧导航）- 9个专业分类
    const TECH_CATEGORIES = [
        { id: "batch_production", name: "批次生产", icon: "fa-calendar-alt", desc: "批次生产是现代化猪场实现全进全出、阻断疾病传播的核心管理模式。通过将母猪群按批次集中配种、分娩、断奶，形成单元化封闭管理，显著提升猪群整齐度，优化劳动力安排。" },
        { id: "disease_control", name: "疾病防控", icon: "fa-shield-virus", desc: "疾病防控体系涵盖生物安全、免疫监测、药物预防与早期预警。提供蓝耳病、PED、支原体等综合防控技术方案与标准化SOP，建立三级预警屏障。" },
        { id: "disease_eradication", name: "疾病净化", icon: "fa-stethoscope", desc: "疾病净化是区域净化与猪场无疫认证的高级阶段。收录国家净化场申报材料、净化标准流程及维持策略，采用封群管理、血清学监测等关键技术。" },
        { id: "breeding_genetics", name: "繁殖和育种", icon: "fa-dna", desc: "繁殖育种板块整合种猪性能测定、BLUP遗传评估、全基因组选择技术。提供育种数据采集指南及遗传进展评估工具，赋能种业提升。" },
        { id: "intelligent_pig", name: "智能养猪", icon: "fa-robot", desc: "智能养猪融合AI视觉估重、智能饲喂机器人、物联网环控及远程决策平台。提供智能设备部署方案、数据采集标准及AI算法应用案例。" },
        { id: "local_breeds", name: "地方品种", icon: "fa-tractor", desc: "地方品种资源具有耐粗饲、抗逆性强、肉质优良等特性。帮助用户实现地方品种与优质猪肉产业链的融合，包括保种技术、杂交配套模式。" },
        { id: "farm_construction", name: "猪场建设", icon: "fa-draw-polygon", desc: "现代化猪场建设聚焦生物安全分区、节能环保及自动化设计。提供模块化猪舍设计标准、建筑材料选型及环境控制系统参数。" },
        { id: "environmental_protection", name: "环保无害化", icon: "fa-recycle", desc: "环保无害化涵盖粪污资源化利用、病死猪无害化处理工艺、臭气控制及污水达标排放。提供猪场环评规范、种养结合模式。" },
        { id: "quality_control", name: "质量控制", icon: "fa-clipboard-list", desc: "质量控制体系贯穿饲料、兽药、生产操作及猪肉产品全链条。强化从投入品到出栏猪肉的品质安全屏障，提升品牌信任度。" }
    ];
    
    const API_ENDPOINT = "/get_standard_files.php";
    let currentPdfDoc = null, currentPageNum = 1, totalPages = 0;
    let currentCategoryId = TECH_CATEGORIES[0].id;
    let filesCache = {};
    
    document.addEventListener('DOMContentLoaded', () => {
        renderSideNav();
        loadCategory(currentCategoryId);
        
        // 移动端菜单
        const mobileToggle = document.getElementById('mobileMenuToggle');
        const mobileSidebar = document.getElementById('mobileSidebar');
        const closeMobile = document.getElementById('closeMobileMenu');
        
        mobileToggle?.addEventListener('click', () => {
            mobileSidebar.classList.remove('hidden');
        });
        closeMobile?.addEventListener('click', () => {
            mobileSidebar.classList.add('hidden');
        });
        mobileSidebar?.addEventListener('click', (e) => {
            if (e.target === mobileSidebar) mobileSidebar.classList.add('hidden');
        });
        
        // PDF 翻页
        document.getElementById('prevPageBtn')?.addEventListener('click', onPrevPage);
        document.getElementById('nextPageBtn')?.addEventListener('click', onNextPage);
    });
    
    function renderSideNav() {
        const container = document.getElementById('navMenuSide');
        const mobileContainer = document.getElementById('mobileNavMenuSide');
        
        const html = TECH_CATEGORIES.map((cat, idx) => `
            <div onclick="loadCategory('${cat.id}')" class="nav-item-side ${idx === 0 ? 'active' : ''}">
                <div class="nav-icon"><i class="fas ${cat.icon}"></i></div>
                <div class="flex-1">${cat.name}</div>
            </div>
        `).join('');
        
        if (container) container.innerHTML = html;
        if (mobileContainer) mobileContainer.innerHTML = html;
    }
    
    async function loadCategory(categoryId) {
        currentCategoryId = categoryId;
        const category = TECH_CATEGORIES.find(c => c.id === categoryId);
        if (!category) return;
        
        // 更新激活样式
        document.querySelectorAll('.nav-item-side').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item-side').forEach(el => {
            if (el.textContent.includes(category.name)) el.classList.add('active');
        });
        // 关闭移动端菜单
        document.getElementById('mobileSidebar')?.classList.add('hidden');
        
        const contentArea = document.getElementById('contentArea');
        contentArea.innerHTML = `
            <div class="content-card">
                <div class="flex justify-center items-center py-20">
                    <div class="loading-spinner"></div>
                    <span class="ml-3 text-gray-500">加载 ${category.name} 资源中...</span>
                </div>
            </div>
        `;
        
        let files = filesCache[categoryId];
        if (!files) {
            files = await fetchFiles(categoryId);
            filesCache[categoryId] = files;
        }
        
        renderContentWithFiles(category, files);
    }
    
    function renderContentWithFiles(category, files) {
        const contentArea = document.getElementById('contentArea');
        
        contentArea.innerHTML = `
            <div class="content-card">
                <div class="content-header">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
                            <i class="fas ${category.icon} text-xl text-white"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-white">${category.name}</h2>
                            <p class="text-emerald-100/80 text-xs">标准化技术指引 · 前沿实践方案</p>
                        </div>
                    </div>
                </div>
                <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 text-sm text-gray-600 leading-relaxed">
                    ${category.desc}
                </div>
                <div class="p-3 md:p-4">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <span class="text-sm font-medium text-gray-600">
                            <i class="far fa-file-alt text-emerald-500 mr-1"></i> 文档列表
                        </span>
                        <span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full text-gray-500">${files.length} 份资料</span>
                    </div>
                    <div id="fileListContainer"></div>
                </div>
            </div>
        `;
        
        renderFileList(files, 'fileListContainer');
    }
    
    function renderFileList(files, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (!files.length) {
            container.innerHTML = `
                <div class="empty-state py-8">
                    <i class="fas fa-folder-open text-3xl text-gray-300 mb-2"></i>
                    <p class="text-gray-400 text-sm">暂无相关文档</p>
                    <p class="text-xs text-gray-300 mt-1">请将文件上传至 /resources/files/${currentCategoryId}/ 目录</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="file-table">
                ${files.map(file => {
                    const ext = (file.ext || '').toLowerCase();
                    const isPdf = ext === 'pdf';
                    const isPpt = ext === 'pptx' || ext === 'ppt';
                    const isDoc = ext === 'doc' || ext === 'docx';
                    const isExcel = ext === 'xls' || ext === 'xlsx';
                    
                    let iconClass = 'fa-file-alt';
                    let iconBg = 'bg-gray-100';
                    let iconColor = 'text-gray-500';
                    
                    if (isPdf) { iconClass = 'fa-file-pdf'; iconBg = 'bg-red-50'; iconColor = 'text-red-500'; }
                    else if (isPpt) { iconClass = 'fa-file-powerpoint'; iconBg = 'bg-orange-50'; iconColor = 'text-orange-500'; }
                    else if (isDoc) { iconClass = 'fa-file-word'; iconBg = 'bg-blue-50'; iconColor = 'text-blue-500'; }
                    else if (isExcel) { iconClass = 'fa-file-excel'; iconBg = 'bg-green-50'; iconColor = 'text-green-500'; }
                    
                    const displayName = file.name || '未命名';
                    const fileUrl = file.url || '';
                    
                    return `
                        <div class="file-table-row">
                            <div class="file-info">
                                <div class="file-icon ${iconBg}">
                                    <i class="fas ${iconClass} ${iconColor}"></i>
                                </div>
                                <span class="file-name" title="${displayName}">${displayName}</span>
                            </div>
                            <div class="file-meta">
                                <span class="file-size">${file.size || '--'}</span>
                                <span class="file-date">${file.date || ''}</span>
                                ${isPdf ? 
                                    `<button onclick="openFile('${displayName.replace(/'/g, "\\'")}', '${fileUrl.replace(/'/g, "\\'")}', true)" class="btn-preview-sm"><i class="fas fa-eye mr-1"></i> 预览</button>` :
                                    `<button onclick="window.open('${fileUrl}', '_blank')" class="btn-download-sm"><i class="fas fa-download"></i></button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }
    
    async function fetchFiles(categoryKey) {
        try {
            const url = `${API_ENDPOINT}?category=${encodeURIComponent(categoryKey)}&t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) return [];
            const data = await resp.json();
            return data.files || [];
        } catch (err) {
            console.warn("获取文件失败:", err);
            return [];
        }
    }
    
    function openFile(title, url, isPdf) {
        if (!url) { alert("文件路径无效"); return; }
        if (isPdf) {
            document.getElementById('previewTitle').innerText = title;
            document.getElementById('downloadBtn').href = url;
            document.getElementById('previewModal').style.display = 'flex';
            loadPdf(url);
        } else {
            window.open(url, '_blank');
        }
    }
    
    async function loadPdf(pdfUrl) {
        const canvas = document.getElementById('previewCanvas');
        const pageInfoSpan = document.getElementById('pageInfo');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        
        pageInfoSpan.innerText = '加载中...';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        
        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            currentPdfDoc = await loadingTask.promise;
            totalPages = currentPdfDoc.numPages;
            currentPageNum = 1;
            await renderPage(currentPageNum);
            pageInfoSpan.innerText = `第 1 / ${totalPages} 页`;
            prevBtn.disabled = true;
            nextBtn.disabled = (totalPages <= 1);
        } catch (err) {
            closePreview();
            alert("PDF加载失败");
        }
    }
    
    async function renderPage(pageNum) {
        if (!currentPdfDoc) return;
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        try {
            const page = await currentPdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.3 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            document.getElementById('pageInfo').innerText = `第 ${pageNum} / ${totalPages} 页`;
        } catch(e) {}
    }
    
    function onPrevPage() {
        if (!currentPdfDoc || currentPageNum <= 1) return;
        currentPageNum--;
        renderPage(currentPageNum);
        document.getElementById('prevPageBtn').disabled = (currentPageNum <= 1);
        document.getElementById('nextPageBtn').disabled = false;
    }
    
    function onNextPage() {
        if (!currentPdfDoc || currentPageNum >= totalPages) return;
        currentPageNum++;
        renderPage(currentPageNum);
        document.getElementById('prevPageBtn').disabled = false;
        document.getElementById('nextPageBtn').disabled = (currentPageNum >= totalPages);
    }
    
    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
        if (currentPdfDoc) currentPdfDoc = null;
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas?.getContext('2d');
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    
    window.loadCategory = loadCategory;
    window.openFile = openFile;
    window.closePreview = closePreview;
    window.onPrevPage = onPrevPage;
    window.onNextPage = onNextPage;
</script>
</body>
</html>
