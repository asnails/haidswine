<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牧知汇 - 规模化猪场生产管理知识库</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f8fc;
            color: #1a2c3e;
            line-height: 1.4;
        }

        .navbar {
            background: #1e4a76;
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .nav-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
        }

        .logo p {
            font-size: 0.65rem;
            color: #bcd0e4;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #ffffff;
            font-size: 0.85rem;
            padding: 4px 0;
            opacity: 0.85;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
            border-bottom: 2px solid #ffffff;
        }

        .two-columns {
            display: flex;
            gap: 32px;
            margin: 28px 0;
        }

        .main-content {
            flex: 3;
        }

        .sidebar {
            flex: 1;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .module-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            border: 1px solid #e8edf2;
        }

        .module-header {
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
        }

        .module-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1e4a76;
        }

        .module-articles {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .article-item {
            padding: 8px 0;
            border-bottom: 1px dashed #eff3f8;
        }

        .article-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c3e50;
            text-decoration: none;
            display: block;
            transition: 0.2s;
            line-height: 1.4;
            cursor: pointer;
        }

        .article-link:hover {
            color: #3b82f6;
        }

        .sidebar-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid #e8edf2;
        }

        .sidebar-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e4a76;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 14px;
        }

        .timeline-item, .hot-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4f9;
            font-size: 0.8rem;
        }

        .timeline-date {
            color: #8ba3bc;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .timeline-title, .hot-title {
            color: #2c3e50;
            text-decoration: none;
            cursor: pointer;
        }

        .timeline-title:hover, .hot-title:hover {
            color: #3b82f6;
        }

        .hot-item .rank {
            color: #3b82f6;
            font-weight: 600;
            font-size: 0.75rem;
            min-width: 22px;
        }

        /* 文章详情页弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #8ba3bc;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #1e4a76;
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e4a76;
            margin-bottom: 12px;
            padding-right: 30px;
        }
        .modal-meta {
            font-size: 0.8rem;
            color: #8ba3bc;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eef2f6;
        }
        .modal-body {
            font-size: 1rem;
            line-height: 1.7;
            color: #334155;
        }
        /* 文章内容排版样式 */
        .modal-body p {
            margin-bottom: 1em;
        }
        .modal-body h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e4a76;
            margin: 1.2em 0 0.6em 0;
        }
        .modal-body h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e4a76;
            margin: 1em 0 0.5em 0;
        }
        .modal-body ul, .modal-body ol {
            margin: 0.8em 0 0.8em 1.8em;
        }
        .modal-body li {
            margin: 0.3em 0;
        }
        .modal-body strong {
            color: #1e4a76;
        }
        .modal-body hr {
            margin: 1.2em 0;
            border: none;
            border-top: 1px solid #eef2f6;
        }
        .modal-body blockquote {
            border-left: 3px solid #1e4a76;
            padding-left: 16px;
            color: #5c7c8f;
            margin: 1em 0;
        }

        footer {
            background: #e9f0f7;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            text-align: center;
            color: #4a7a9e;
            font-size: 0.75rem;
            margin-top: 20px;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: #8ba3bc;
        }

        @media (max-width: 900px) {
            .two-columns {
                flex-direction: column;
            }
            .modules-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .container {
                padding: 0 16px;
            }
            .nav-links {
                gap: 16px;
            }
            .modal-content {
                padding: 20px;
            }
            .modal-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-flex">
        <div class="logo">
            <h1>牧知汇</h1>
            <p>猪群健康管理 · 精准繁育智库</p>
        </div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">生产管理</a>
            <a href="#">猪群健康</a>
            <a href="#">批次化生产</a>
            <a href="#">管理思路</a>
        </div>
    </div>
</div>

<div class="container two-columns">
    <div class="main-content">
        <div class="modules-grid">
            <div class="module-card">
                <div class="module-header"><div class="module-title">📋 生产管理</div></div>
                <div class="module-articles" id="production-list"><div class="loading-text">加载中...</div></div>
            </div>
            <div class="module-card">
                <div class="module-header"><div class="module-title">🩺 猪群健康</div></div>
                <div class="module-articles" id="health-list"><div class="loading-text">加载中...</div></div>
            </div>
            <div class="module-card">
                <div class="module-header"><div class="module-title">📅 批次化生产</div></div>
                <div class="module-articles" id="batch-list"><div class="loading-text">加载中...</div></div>
            </div>
            <div class="module-card">
                <div class="module-header"><div class="module-title">💡 管理思路</div></div>
                <div class="module-articles" id="management-list"><div class="loading-text">加载中...</div></div>
            </div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-card">
            <div class="sidebar-title">🔥 热点文章</div>
            <div id="hot-list"></div>
        </div>
        <div class="sidebar-card">
            <div class="sidebar-title">📅 时间轴</div>
            <div id="timeline-list"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 牧知汇 · 猪群健康管理 | 提高繁殖效率，成为国内顶尖5%猪场</p>
</footer>

<!-- 文章详情弹窗 -->
<div id="articleModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const CATEGORY_MAPPING = {
        '生产管理': 'production',
        '猪群健康': 'health',
        '批次化生产': 'batch',
        '管理思路': 'management'
    };

    const hotArticles = [
        "18天批次生产模式详解与优势分析",
        "蓝耳病双阴性场维持策略",
        "秦英林：养猪虽传统，但值得深耕",
        "PSY从24到30的路径拆解",
        "母猪非生产天数(NPD)控制与考核体系"
    ];

    const timelineData = [
        { date: "05/27", title: "批次化生产模块新增10篇文章" },
        { date: "05/26", title: "猪群健康模块内容更新" },
        { date: "05/25", title: "生产管理模块优化排版" },
        { date: "05/24", title: "管理思路模块新增行业观点" },
        { date: "05/23", title: "网站整体改版" }
    ];

    let articlesData = {
        production: [],
        health: [],
        batch: [],
        management: []
    };

    // ==================== 内容格式化函数 ====================
    /**
     * 将纯文本内容自动转换为格式化的 HTML
     * 支持：段落自动分段、标题识别、列表识别、强调文本
     */
    function formatContentToHTML(content) {
        if (!content || content.trim() === '') {
            return '<p style="color: #8ba3bc;">暂无详细内容</p>';
        }
        
        let text = content.trim();
        
        // 1. 处理标题行（以 # 或 ## 开头的行）
        text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
        
        // 2. 处理无序列表（以 - 或 * 开头的行）
        text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
        // 将连续的列表项包裹在 <ul> 中
        text = text.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
            return '<ul>' + match + '</ul>';
        });
        
        // 3. 处理有序列表（以 1. 2. 等开头的行）
        text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
        // 将连续的有序列表项包裹在 <ol> 中
        text = text.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
            // 避免重复包裹（如果已经是无序列表）
            if (!match.includes('<ul>')) {
                return '<ol>' + match + '</ol>';
            }
            return match;
        });
        
        // 4. 处理粗体（**文字**）
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        // 5. 处理斜体（*文字*）
        text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
        
        // 6. 处理水平分割线（---）
        text = text.replace(/^---$/gm, '<hr>');
        
        // 7. 处理引用块（> 开头的行）
        text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
        
        // 8. 将普通文本转换为段落（按空行分割）
        let paragraphs = text.split(/\n\s*\n/);
        let formattedParagraphs = [];
        
        for (let para of paragraphs) {
            para = para.trim();
            if (para === '') continue;
            
            // 如果已经是 HTML 标签包裹的内容，直接保留
            if (para.startsWith('<h2>') || para.startsWith('<h3>') || 
                para.startsWith('<ul>') || para.startsWith('<ol>') || 
                para.startsWith('<li>') || para.startsWith('<hr>') ||
                para.startsWith('<blockquote>')) {
                formattedParagraphs.push(para);
            } else {
                // 普通文本，转换为段落，并处理换行符
                let inlinePara = para.replace(/\n/g, '<br>');
                formattedParagraphs.push(`<p>${inlinePara}</p>`);
            }
        }
        
        let html = formattedParagraphs.join('\n');
        
        // 9. 清理多余的嵌套
        html = html.replace(/<ul>(\s*<ul>)+/g, '<ul>');
        html = html.replace(/<\/ul>\s*<\/ul>/g, '</ul>');
        html = html.replace(/<ol>(\s*<ol>)+/g, '<ol>');
        html = html.replace(/<\/ol>\s*<\/ol>/g, '</ol>');
        
        return html;
    }

    // ==================== 数据加载 ====================
    async function loadArticlesFromJSON() {
        try {
            const response = await fetch('articles.json?v=' + Date.now());
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (!Array.isArray(data)) throw new Error('数据格式错误');
            
            articlesData = { production: [], health: [], batch: [], management: [] };
            
            data.forEach(item => {
                const category = CATEGORY_MAPPING[item.type];
                if (category && item.title) {
                    articlesData[category].push({
                        title: item.title,
                        content: item.content || ''
                    });
                }
            });
            
            renderAll();
        } catch (error) {
            console.error('加载失败:', error);
            useDefaultData();
        }
    }
    
    function useDefaultData() {
        articlesData = {
            production: [
                { title: "6000头规模母猪场生产节律设计", content: "生产节律设计是规模化猪场高效运转的核心。本指南详细说明配种、分娩、断奶等环节的时间安排。" }
            ],
            health: [
                { title: "蓝耳病双阴性场维持策略", content: "蓝耳病双阴性场的维持需要严格的生物安全措施和监测计划。" }
            ],
            batch: [
                { title: "18天批次生产模式详解与优势分析", content: "18天批次模式的优势在于提高栏舍利用率和人工效率。" }
            ],
            management: [
                { title: "秦英林：养猪虽传统，但值得深耕", content: "养猪行业虽然传统，但通过技术创新仍有巨大发展空间。" }
            ]
        };
        renderAll();
    }
    
    // ==================== 渲染函数 ====================
    function renderModule(moduleId, articles) {
        const container = document.getElementById(`${moduleId}-list`);
        if (!container) return;
        
        if (articles.length === 0) {
            container.innerHTML = '<div style="color: #8ba3bc; text-align: center; padding: 20px;">暂无文章</div>';
            return;
        }
        
        let html = '';
        articles.forEach((article, idx) => {
            const safeTitle = article.title.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            html += `
                <div class="article-item">
                    <a class="article-link" data-title="${safeTitle}" data-index="${idx}" data-module="${moduleId}">${escapeHtml(article.title)}</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function renderHotArticles() {
        const container = document.getElementById('hot-list');
        if (!container) return;
        let html = '';
        hotArticles.forEach((title, index) => {
            html += `<div class="hot-item"><span class="rank">${index + 1}</span><a class="hot-title" data-title="${escapeHtml(title)}">${escapeHtml(title)}</a></div>`;
        });
        container.innerHTML = html;
    }
    
    function renderTimeline() {
        const container = document.getElementById('timeline-list');
        if (!container) return;
        let html = '';
        timelineData.forEach(item => {
            html += `<div class="timeline-item"><span class="timeline-date">${item.date}</span><a class="timeline-title" data-title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</a></div>`;
        });
        container.innerHTML = html;
    }
    
    function renderAll() {
        renderModule('production', articlesData.production);
        renderModule('health', articlesData.health);
        renderModule('batch', articlesData.batch);
        renderModule('management', articlesData.management);
        renderHotArticles();
        renderTimeline();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== 弹窗显示文章详情 ====================
    function openArticle(title, moduleId, index) {
        const articles = articlesData[moduleId];
        const article = articles && articles[index] ? articles[index] : null;
        
        if (!article) {
            alert('文章内容加载失败');
            return;
        }
        
        const modal = document.getElementById('articleModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMeta = document.getElementById('modalMeta');
        const modalBody = document.getElementById('modalBody');
        
        modalTitle.textContent = article.title;
        
        // 获取分类中文名
        const categoryName = Object.keys(CATEGORY_MAPPING).find(key => CATEGORY_MAPPING[key] === moduleId) || '技术文章';
        const today = new Date().toLocaleDateString('zh-CN');
        modalMeta.textContent = `${categoryName} | 更新于 ${today}`;
        
        // 使用格式化函数处理内容
        const formattedContent = formatContentToHTML(article.content);
        modalBody.innerHTML = formattedContent;
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        const modal = document.getElementById('articleModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
    
    // ==================== 事件绑定 ====================
    function bindArticleClick() {
        document.addEventListener('click', (e) => {
            const target = e.target;
            
            // 主页文章链接
            if (target.classList.contains('article-link')) {
                e.preventDefault();
                const title = target.getAttribute('data-title');
                const moduleId = target.getAttribute('data-module');
                const index = parseInt(target.getAttribute('data-index'));
                openArticle(title, moduleId, index);
                return;
            }
            
            // 热点文章链接
            if (target.classList.contains('hot-title')) {
                e.preventDefault();
                const title = target.textContent;
                // 在热点文章中查找，从所有模块中搜索
                for (const [moduleId, articles] of Object.entries(articlesData)) {
                    const foundIndex = articles.findIndex(a => a.title === title);
                    if (foundIndex !== -1) {
                        openArticle(title, moduleId, foundIndex);
                        return;
                    }
                }
                alert(`📄 文章详情页\n\n“${title}”\n\n详情页功能正在建设中，敬请期待！`);
                return;
            }
            
            // 时间轴链接
            if (target.classList.contains('timeline-title')) {
                e.preventDefault();
                const title = target.textContent;
                alert(`📄 更新内容\n\n“${title}”\n\n详情页功能正在建设中，敬请期待！`);
            }
        });
    }
    
    // 点击遮罩层关闭弹窗
    document.getElementById('articleModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('articleModal')) {
            closeModal();
        }
    });
    
    // 按 ESC 键关闭弹窗
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
        }
    });
    
    // 为文章链接添加 data-module 和 data-index 属性（需要在渲染后绑定）
    function enrichArticleLinks() {
        for (const [moduleId, articles] of Object.entries(articlesData)) {
            const container = document.getElementById(`${moduleId}-list`);
            if (container) {
                const links = container.querySelectorAll('.article-link');
                links.forEach((link, idx) => {
                    link.setAttribute('data-module', moduleId);
                    link.setAttribute('data-index', idx);
                });
            }
        }
    }
    
    // 修改渲染函数，添加索引
    const originalRenderModule = renderModule;
    window.renderModule = function(moduleId, articles) {
        const container = document.getElementById(`${moduleId}-list`);
        if (!container) return;
        
        if (articles.length === 0) {
            container.innerHTML = '<div style="color: #8ba3bc; text-align: center; padding: 20px;">暂无文章</div>';
            return;
        }
        
        let html = '';
        articles.forEach((article, idx) => {
            const safeTitle = article.title.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            html += `
                <div class="article-item">
                    <a class="article-link" data-title="${safeTitle}" data-module="${moduleId}" data-index="${idx}">${escapeHtml(article.title)}</a>
                </div>
            `;
        });
        container.innerHTML = html;
    };
    
    // 覆盖渲染函数
    renderModule = window.renderModule;
    
    // 重新实现 renderAll 使用新的渲染函数
    const newRenderAll = function() {
        renderModule('production', articlesData.production);
        renderModule('health', articlesData.health);
        renderModule('batch', articlesData.batch);
        renderModule('management', articlesData.management);
        renderHotArticles();
        renderTimeline();
    };
    
    // 替换
    window.renderAll = newRenderAll;
    
    // 初始化
    loadArticlesFromJSON();
    bindArticleClick();
</script>
</body>
</html>
