let currentMain = 'health', currentSub = 'biosecurity';
let pdfDoc = null, pageNum = 1, pageCount = 0;
let fileCache = {};

document.addEventListener('DOMContentLoaded', () => {
    renderNav();
    renderSidebar();
    loadContent(currentMain, currentSub);
    document.getElementById('mobileMenuBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('hidden');
    document.getElementById('prevPageBtn').onclick = onPrev;
    document.getElementById('nextPageBtn').onclick = onNext;
});

function renderNav() {
    const nav = document.getElementById('navMenu');
    const mobile = document.getElementById('mobileNavMenu');
    const html = topNav.map((item, i) => `<a onclick="switchMain('${item.id}')" class="nav-item inline-block px-2 py-1 text-xs rounded ${i===0?'active':''}"><i class="fas ${item.icon} mr-0.5"></i> ${item.name}</a>`).join('');
    nav.innerHTML = html;
    mobile.innerHTML = topNav.map(item => `<a onclick="switchMain('${item.id}');document.getElementById('mobileMenu').classList.add('hidden');" class="nav-item block px-3 py-2 text-sm">${item.name}</a>`).join('');
}

function switchMain(mainId) {
    currentMain = mainId;
    const firstSub = Object.keys(diseaseData[mainId].children)[0];
    currentSub = firstSub;
    loadContent(currentMain, currentSub);
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const idx = topNav.findIndex(i => i.id === mainId);
    document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
    renderSidebar();
}

function renderSidebar() {
    const sidebar = document.getElementById('sidebarMenu');
    let html = '';
    for (const [mainId, main] of Object.entries(diseaseData)) {
        const active = mainId === currentMain;
        html += `<div class="mb-0.5"><div class="main-menu-item px-2 py-1.5 flex justify-between items-center ${active?'active':''}" data-main="${mainId}"><div class="flex items-center gap-1.5"><i class="fas ${main.icon} text-blue-600 w-3 text-xs"></i><span class="font-medium text-sm">${main.name}</span></div><i class="fas fa-chevron-down text-slate-400 text-[10px] transition-transform ${active?'':'rotate-90'}"></i></div><div class="sub-menu-container pl-2 ${active?'':'hidden'}">`;
        for (const [subId, sub] of Object.entries(main.children)) {
            html += `<div class="sub-menu-item px-2 py-1 text-xs ${active && subId===currentSub?'active':''}" data-main="${mainId}" data-sub="${subId}"><i class="fas fa-book-open text-slate-400 w-3 text-[10px] mr-1.5"></i><span>${sub.name}</span></div>`;
        }
        html += `</div></div>`;
    }
    sidebar.innerHTML = html;
    
    document.querySelectorAll('.main-menu-item').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); const sub = el.nextElementSibling; const icon = el.querySelector('.fa-chevron-down'); sub?.classList.toggle('hidden'); icon?.classList.toggle('rotate-90'); };
    });
    document.querySelectorAll('.sub-menu-item').forEach(el => {
        el.onclick = () => { currentMain = el.dataset.main; currentSub = el.dataset.sub; loadContent(currentMain, currentSub); renderSidebar(); syncNav(); };
    });
}

function syncNav() {
    const idx = topNav.findIndex(i => i.id === currentMain);
    document.querySelectorAll('.nav-item').forEach((el, i) => i===idx ? el.classList.add('active') : el.classList.remove('active'));
}

        try {

                <div class="px-4 pb-2"><div class="info-card eval-card"><div class="info-card-title"><i class="fas fa-chart-line"></i> 防控效果评估</div><div class="info-card-content">${item.evalEffect}</div></div></div>
                <div class="section-divider"></div>
                <div class="p-4"><div class="doc-section-title"><i class="fas fa-file-alt text-blue-600 mr-2"></i>相关文档</div><div class="flex justify-between items-center mb-3"><span class="text-xs text-slate-500">共 ${files.length} 份资料</span></div><div class="file-grid" id="fileGrid">${files.map(f => `<div class="file-card" onclick="openPDF('${f.url}','${f.name.replace(/'/g,"\\'")}')"><div class="flex justify-between items-start"><i class="fas fa-file-pdf text-red-500 text-base"></i><span class="text-[10px] text-slate-400">${f.date||''}</span></div><div class="text-sm font-medium mt-1 truncate">${f.name}</div><div class="flex justify-between mt-1"><span class="text-[10px] text-slate-400">${f.size||''}</span><span class="btn-preview text-[10px]"><i class="fas fa-eye mr-0.5"></i>预览</span></div></div>`).join('')}</div></div>
            </div>`;
    }
}

function openPDF(url, title) {
    const modal = document.getElementById('previewModal');
    document.getElementById('previewTitle').innerText = title;
    document.getElementById('downloadBtn').href = url;
    modal.style.display = 'flex';
    loadPDF(url);
}

async function loadPDF(url) {
    const canvas = document.getElementById('previewCanvas');
    const info = document.getElementById('pageInfo');
    const prev = document.getElementById('prevPageBtn');
    const next = document.getElementById('nextPageBtn');
    info.innerText = '加载中...'; prev.disabled = true; next.disabled = true;
    try {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        pageCount = pdfDoc.numPages; pageNum = 1;
        await renderPage(pageNum);
        info.innerText = `第 1 / ${pageCount} 页`;
        prev.disabled = true;
        next.disabled = pageCount <= 1;
    } catch(e) { closePreview(); }
}

async function renderPage(num) {
    if (!pdfDoc) return;
    const page = await pdfDoc.getPage(num);
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = page.getViewport({ scale: 1.2 });
    canvas.height = viewport.height; canvas.width = viewport.width;
    await page.render({ canvasContext: ctx, viewport }).promise;
    document.getElementById('pageInfo').innerText = `第 ${num} / ${pageCount} 页`;
}

function onPrev() { if (pdfDoc && pageNum > 1) { pageNum--; renderPage(pageNum); document.getElementById('prevPageBtn').disabled = pageNum<=1; document.getElementById('nextPageBtn').disabled=false; } }
function onNext() { if (pdfDoc && pageNum < pageCount) { pageNum++; renderPage(pageNum); document.getElementById('prevPageBtn').disabled=false; document.getElementById('nextPageBtn').disabled=pageNum>=pageCount; } }
function closePreview() { document.getElementById('previewModal').style.display = 'none'; pdfDoc = null; }
</script>
</body>
</html>
